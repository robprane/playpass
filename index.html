<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal System Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .log-container { border: 1px solid #ccc; padding: 10px; height: 250px; overflow-y: scroll; background: #f4f4f4; margin-bottom: 20px; font-family: monospace; }
        .controls { margin-bottom: 15px; padding: 15px; border: 1px solid #eee; background: #fafafa; border-radius: 5px; }
        .controls h3 { margin-top: 0; margin-bottom: 10px; color: #333; }
        input, button { padding: 8px; margin: 5px 5px 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #e0e0e0; cursor: pointer; }
        button:hover { background: #d0d0d0; }
        #qr-container { margin-top: 10px; }
        #qr-container svg { max-width: 200px; height: auto; }
        #qr-video { width: 100%; max-width: 300px; border: 1px solid #ccc; display: none; margin-top: 10px; background: #000; }
    </style>
</head>
<body>
    <h2>Full System Integration Test</h2>

    <div class="log-container" id="log-output"></div>

    <div class="controls">
        <h3>WebAuthn</h3>
        <button id="btn-register">Register</button>
        <button id="btn-login">Login</button>
        <button id="btn-logout">Logout</button>
    </div>

    <div class="controls">
        <h3>Email Operations</h3>
        <input type="email" id="input-email" placeholder="user@example.com">
        <button id="btn-link-email">Link Email</button>
        <button id="btn-recover">Recover Access</button>
    </div>

    <div class="controls">
        <h3>QR Connect</h3>
        <button id="btn-show-qr">Generate QR Code</button>
        <button id="btn-scan-qr">Start Scanner</button>
        <div id="qr-container"></div>
        <video id="qr-video" playsinline></video>
    </div>

    <div class="controls">
        <h3>WebRTC Game Data</h3>
        <input type="text" id="input-room" placeholder="Room ID" value="test-room">
        <button id="btn-connect">Connect WebRTC</button>
        <button id="btn-disconnect">Disconnect</button>
        <button id="btn-send">Send Broadcast</button>
    </div>

    <div class="controls">
        <h3>3. Universal Commit-Reveal (PRNG & Actions)</h3>
        <div class="flex-row">
            <button id="btn-gen-random">Generate Shared Random</button>
        </div>
        <hr>
        <div class="flex-row">
            <input type="text" id="input-action" placeholder="Your hidden move (e.g. Rock)">
            <button id="btn-send-action">Submit Simultaneous Action</button>
        </div>
        <p><small>* Simultaneous actions require ALL peers to submit their move to proceed.</small></p>
    </div>

    <script type="module">
        import AuthClient from './AuthClient.js?v{{ Math.floor(Date.now()/1000/60) }}';
        import WebRTCClient from './WebRTCClient.js?v{{ Math.floor(Date.now()/1000/60) }}';
        import CommitRevealClient from './CommitRevealClient.js?v{{ Math.floor(Date.now()/1000/60) }}';

        const logOutput = document.getElementById('log-output');
        const appendLog = (msg, type = 'info') => {
            console.log(msg);
            const el = document.createElement('div');
            el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (type === 'error') el.style.color = 'red';
            if (type === 'success') el.style.color = 'green';
            logOutput.appendChild(el);
            logOutput.scrollTop = logOutput.scrollHeight;
        };

        const apiHost = 'https://a.oreki.co';

        const auth = new AuthClient({
            apiUrl: `${apiHost}/prod`,
            onLog: appendLog,
            onStateChange: (isLoggedIn, token) => {
                appendLog(`State changed: Logged in = ${isLoggedIn}`);
            }
        });

        let rtcClient = null;
        let crClient = null;

        // WebAuthn
        document.getElementById('btn-register').onclick = () => auth.register().catch(e => appendLog(e.message, 'error'));
        document.getElementById('btn-login').onclick = () => auth.login().catch(e => appendLog(e.message, 'error'));
        document.getElementById('btn-logout').onclick = () => auth.logout();

        // Email
        document.getElementById('btn-link-email').onclick = () => {
            const email = document.getElementById('input-email').value;
            if (!email) return appendLog('Please enter an email', 'error');
            auth.linkEmail(email).catch(e => appendLog(e.message, 'error'));
        };

        document.getElementById('btn-recover').onclick = () => {
            const email = document.getElementById('input-email').value;
            if (!email) return appendLog('Please enter an email', 'error');
            auth.recoverAccess(email).catch(e => appendLog(e.message, 'error'));
        };

        // QR Connect
        document.getElementById('btn-show-qr').onclick = async () => {
            try {
                const svg = await auth.getQrCodeSvg();
                document.getElementById('qr-container').innerHTML = svg;
            } catch (e) {
                appendLog(e.message, 'error');
            }
        };

        document.getElementById('btn-scan-qr').onclick = async () => {
            const video = document.getElementById('qr-video');
            video.style.display = 'block';
            try {
                await auth.startQrScanner(video);
                appendLog('QR Code scanned and session approved successfully!', 'success');
            } catch (e) {
                appendLog(e.message, 'error');
            } finally {
                video.style.display = 'none';
            }
        };

        // WebRTC
        document.getElementById('btn-connect').onclick = async () => {
            const room = document.getElementById('input-room').value;

            const authProvider = async () => {
                const fetchToken = async () => {
                    return await fetch(`${auth.apiUrl}/webrtc/auth`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.accessToken}`
                        },
                        body: JSON.stringify({ project: 'testProject', room: room })
                    });
                };

                appendLog('Requesting WebRTC auth token...');
                let res = await fetchToken();

                if (res.status === 401 || res.status === 403) {
                    appendLog('Main session expired, refreshing...');

                    let refreshSuccess = false;
                    for (let i = 0; i < 3; i++) {
                        try {
                            await auth.forceRefresh();
                            refreshSuccess = true;
                            break;
                        } catch (e) {
                            if (e.message && e.message.includes('401')) {
                                throw new Error('FATAL_AUTH');
                            }
                            appendLog(`Auth refresh failed, retrying (${i + 1}/3)...`);
                            await new Promise(r => setTimeout(r, 2000));
                        }
                    }

                    if (!refreshSuccess) {
                        throw new Error('FATAL_AUTH');
                    }

                    res = await fetchToken();
                }

                if (res.status === 401 || res.status === 403) {
                    throw new Error('FATAL_AUTH');
                }

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            };

            try {
                const initData = await authProvider();

                rtcClient = new WebRTCClient(
                    `${apiHost}/sse`,
                    initData.roomId,
                    initData.sessionId,
                    initData.userId,
                    authProvider,
                    'sseAuthorization',
                    appendLog
                );

                // Initialize the Universal Module
                crClient = new CommitRevealClient(rtcClient, (actionId, result) => {
                    appendLog(`[CR RESOLVED] ID: ${actionId}`, 'success');
                    appendLog(`> Shared Seed: ${result.seed}`);
                    appendLog(`> Actions: ${JSON.stringify(result.actions)}`);
                }, appendLog);

                crClient.onPeerReady = (peerId, actionId) => {
                    appendLog(`[!] Opponent ${peerId} locked their move for ${actionId}! Waiting for your input...`, 'success');
                };

                await rtcClient.connect();
                appendLog(`WebRTC initialization complete for room: ${room}`);
            } catch (err) {
                console.error(err);
                appendLog(`WebRTC Connect error: ${err.message}`, 'error');
            }
        };

        document.getElementById('btn-disconnect').onclick = () => {
            if (rtcClient) {
                rtcClient.disconnect();
                rtcClient = null;
                appendLog('WebRTC Disconnected');
            } else {
                appendLog('No active WebRTC connection', 'error');
            }
        };

        document.getElementById('btn-send').onclick = () => {
            if (rtcClient) {
                rtcClient.broadcast({
                    action: 'ping',
                    timestamp: Date.now()
                });
                appendLog('Broadcast message sent via DataChannels');
            } else {
                appendLog('Connect WebRTC first', 'error');
            }
        };

        // Trigger PRNG (Random Number)
        document.getElementById('btn-gen-random').onclick = async () => {
            if (!crClient) return appendLog('Connect WebRTC first', 'error');
            try {
                const actionId = `rng_${Math.floor(Math.random() * 10000)}`;
                appendLog(`Initiating PRNG: ${actionId}`);
                // Passing null as payload triggers PRNG mode
                const result = await crClient.execute(actionId, null);
                appendLog(`Local result for ${actionId}: Seed ${result.seed}`);
            } catch (e) {
                appendLog(e.message, 'error');
            }
        };

        // Trigger Simultaneous Action
        document.getElementById('btn-send-action').onclick = async () => {
            if (!crClient) return appendLog('Connect WebRTC first', 'error');
            const actionPayload = document.getElementById('input-action').value;
            if (!actionPayload) return appendLog('Enter an action first', 'error');

            const roomId = document.getElementById('input-room').value;

            try {
                const actionId = `turn_${roomId || 'shared'}`;
                appendLog(`Committing action: "${actionPayload}" for ID: ${actionId}`);

                // Set timeout to 60000ms (60 seconds) for human interaction
                const result = await crClient.execute(actionId, actionPayload, 60000);
                appendLog(`Simultaneous turn ${actionId} verified!`, 'success');
            } catch (e) {
                appendLog(e.message, 'error');
            }
        };

        // Auto-init Auth
        auth.init().catch(() => {});
    </script>
</body>
</html>
